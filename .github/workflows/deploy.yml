name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 最上層只設最低限度；各 job 明確宣告自己需要的權限
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute deploy base path
        id: base
        run: |
          repo="${{ github.event.repository.name }}"
          if [[ "$repo" == *.github.io ]]; then
            echo "deploy_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate static site
        env:
          DEPLOY_BASE: ${{ steps.base.outputs.deploy_base }}
        run: npm run generate

      - name: Add .nojekyll
        run: touch .output/public/.nojekyll

      - name: Verify output directory
        run: |
          echo "=== Output directory contents ==="
          ls -la .output/public/
          echo "=== index.html exists? ==="
          test -f .output/public/index.html && echo "YES" || echo "NO — build failed"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy job 必須明確宣告這兩個權限，GitHub Pages OIDC 部署才能運作
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
