name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute deploy base path
        id: base
        run: |
          repo="${{ github.event.repository.name }}"
          if [[ "$repo" == *.github.io ]]; then
            echo "deploy_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_base=/$repo/" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate static site
        env:
          DEPLOY_BASE: ${{ steps.base.outputs.deploy_base }}
        run: npm run generate

      - name: Add .nojekyll
        run: touch .output/public/.nojekyll

      - name: Verify output
        run: |
          echo "Files in .output/public:"
          ls .output/public/
          test -f .output/public/index.html && echo "index.html OK" || (echo "ERROR: index.html missing" && exit 1)

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
